<!DOCTYPE html>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --core-red: #ff003c; --core-gold: #ffd700; --dark-bg: #030303; --glass: rgba(15,15,15,0.95); }
        * { box-sizing: border-box; transition: 0.3s; cursor: crosshair; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; display: flex; flex-direction: column; }

        #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.2; }

        /* --- HEADER --- */
        nav { padding: 10px 25px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--core-red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .dragon-logo { font-size: 24px; color: var(--core-red); text-shadow: 0 0 15px var(--core-red); }

        /* --- SIDE PREMIUM BUTTON --- */
        .side-premium { position: fixed; left: 0; top: 50%; transform: translateY(-50%); background: var(--core-gold); color: black; padding: 15px 10px; border-radius: 0 10px 10px 0; font-weight: bold; writing-mode: vertical-rl; text-orientation: mixed; cursor: pointer; z-index: 999; border: 1px solid black; font-size: 12px; }

        /* --- MAIN UI --- */
        .container { flex: 1; max-width: 1200px; margin: auto; padding: 20px; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; padding-bottom: 100px; }
        
        .card { background: #080808; border: 1px solid #1a1a1a; padding: 20px; border-radius: 15px; position: relative; }
        .premium-card { border-color: var(--core-gold) !important; background: linear-gradient(145deg, #080808, #1a1600); }

        /* --- MODALS --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--glass); border: 1px solid var(--core-red); width: 100%; max-width: 450px; padding: 30px; border-radius: 20px; max-height: 90vh; overflow-y: auto; }
        
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; background: #000; color: white; border: 1px solid #333; border-radius: 8px; font-size: 14px; }
        .btn-action { display: block; width: 100%; padding: 12px; background: transparent; border: 1px solid var(--core-red); color: white; font-weight: bold; border-radius: 8px; cursor: pointer; text-decoration: none; margin-top: 10px; }
        .btn-action:hover { background: var(--core-red); box-shadow: 0 0 15px var(--core-red); }

        /* --- FOOTER (FIXED) --- */
        footer { background: #000; padding: 20px; text-align: center; border-top: 1px solid #111; font-size: 11px; color: #555; position: relative; bottom: 0; width: 100%; }

        /* --- WHATSAPP HELP --- */
        .wa-float { position: fixed; bottom: 100px; right: 20px; background: #25d366; color: white; padding: 10px 18px; border-radius: 50px; text-decoration: none; font-weight: bold; z-index: 1000; display: flex; align-items: center; gap: 8px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); font-size: 13px; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="side-premium" onclick="showPremiumInfo()">PREMIUM SUBSCRIBE</div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--core-red); margin-top:0;">🔐 LOGIN PORTAL</h2>
            <button class="btn-action" onclick="loginWithGoogle()"><i class="fab fa-google"></i> GOOGLE LOGIN</button>
            <div style="margin:20px 0; color: #444; font-size: 12px;">OR</div>
            <input type="text" id="p-user" placeholder="Premium Username">
            <input type="password" id="p-pass" placeholder="Premium Password">
            <button class="btn-action" style="border-color:var(--core-gold); color:var(--core-gold);" onclick="loginPremium()">PREMIUM LOGIN</button>
            <button class="btn-action" style="border:none; color:#555;" onclick="closeModal()">CLOSE</button>
        </div>
    </div>

    <div id="profile-modal" class="modal">
        <div class="modal-content" style="border-color: var(--core-gold);">
            <h2 id="profile-title" style="color:var(--core-gold); margin-top:0;">👤 MY PROFILE</h2>
            <div id="profile-img-area" style="margin-bottom:15px;"></div>
            <p id="user-id-display" style="font-size: 11px; color: #666;"></p>
            <form id="profile-form">
                <input type="text" id="prof-name" placeholder="ඔබේ නම (Full Name)" required>
                <input type="text" id="prof-wa" placeholder="WhatsApp අංකය" required>
                <input type="text" id="prof-loc" placeholder="පදිංචි නගරය" required>
                <button type="submit" class="btn-action">SAVE & SUBMIT DETAILS</button>
            </form>
            <button id="logout-btn" class="btn-action" style="border-color:gray; color:gray;" onclick="logout()">LOGOUT</button>
        </div>
    </div>

    <nav>
        <div class="nav-left">
            <i class="fas fa-dragon dragon-logo"></i>
            <span style="font-weight:900; letter-spacing:2px;">DRAGON <span style="color:var(--core-red)">CORE</span></span>
        </div>
        <div id="user-ctrl">
            <button class="btn-action" style="margin:0; padding:5px 15px;" onclick="showLogin()">LOGIN</button>
        </div>
    </nav>

    <div class="container">
        <div id="admin-box" style="display:none; background:rgba(255,0,0,0.05); padding:20px; border-radius:15px; border:1px dashed var(--core-red); margin-bottom:30px;">
            <h3 style="color:var(--core-red); margin-top:0;">🐲 ADMIN COMMAND</h3>
            <input type="text" id="c-name" placeholder="Config Name">
            <input type="text" id="c-url" placeholder="Config URL">
            <select id="c-type">
                <option value="FREE">FREE SERVER</option>
                <option value="PREMIUM">PREMIUM SERVER</option>
            </select>
            <button class="btn-action" onclick="pushData()">PUBLISH CONFIG</button>
        </div>

        <div class="grid" id="main-grid"></div>
    </div>

    <a href="https://wa.me/94755751816?text=Need%20Help%20DragonCore" target="_blank" class="wa-float">
        <i class="fab fa-whatsapp"></i> NEED HELP?
    </a>

    <footer>
        ALL RIGHTS RESERVED 2026 | POWERED BY <span style="color:var(--core-red); font-weight:bold;">AKIYA-MD</span>
        <br><span onclick="checkAdminGate()" style="cursor:pointer; opacity:0.2; font-size:8px;">ADMIN_ACCESS</span>
    </footer>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAqX2abIZOxSTIhneLuxHqsMl66l9cGAVo",
            authDomain: "dragon-core-vpn.firebaseapp.com",
            databaseURL: "https://dragon-core-vpn-default-rtdb.firebaseio.com",
            projectId: "dragon-core-vpn",
            storageBucket: "dragon-core-vpn.firebasestorage.app",
            messagingSenderId: "114225209703",
            appId: "1:114225209703:web:4c2b9611511e892db9cfc2"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        let currentUser = null;
        const premiumUsers = {};
        for(let i=1; i<=100; i++) premiumUsers[`dragon_user${i}`] = `pass_akiya${i}`;

        function showLogin() { document.getElementById('login-modal').style.display='flex'; }
        function closeModal() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }

        function loginWithGoogle() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(res => {
                saveSession(res.user.email, res.user.photoURL, "GOOGLE");
            });
        }

        function loginPremium() {
            const u = document.getElementById('p-user').value;
            const p = document.getElementById('p-pass').value;
            if(premiumUsers[u] === p) {
                saveSession(u, "https://cdn-icons-png.flaticon.com/512/1458/1458201.png", "PREMIUM");
            } else { alert("Login Fail! Check Username & Password."); }
        }

        function saveSession(id, img, type) {
            const session = { id, img, type };
            localStorage.setItem('dragon_session', JSON.stringify(session));
            location.reload();
        }

        function checkSession() {
            const session = JSON.parse(localStorage.getItem('dragon_session'));
            if(session) {
                currentUser = session;
                const color = (session.type === "PREMIUM") ? "var(--core-gold)" : "var(--core-red)";
                document.getElementById('user-ctrl').innerHTML = `
                    <div onclick="openProfile()" style="cursor:pointer; border:2px solid ${color}; border-radius:50%; overflow:hidden; width:35px; height:35px;">
                        <img src="${session.img}" style="width:100%;">
                    </div>
                `;
                
                document.getElementById('profile-img-area').innerHTML = `<img src="${session.img}" style="width:80px; border-radius:50%; border:3px solid ${color}">`;
                document.getElementById('user-id-display').innerText = "Account: " + session.id;
                document.getElementById('profile-title').innerText = (session.type === "PREMIUM") ? "🏆 PREMIUM PROFILE" : "👤 GOOGLE PROFILE";
                document.getElementById('logout-btn').innerText = (session.type === "PREMIUM") ? "PREMIUM LOGOUT" : "GOOGLE LOGOUT";
            }
            loadVault();
        }

        function openProfile() { document.getElementById('profile-modal').style.display='flex'; }

        document.getElementById('profile-form').onsubmit = (e) => {
            e.preventDefault();
            const msg = `*New Profile Update*%0AAccount: ${currentUser.id}%0AName: ${document.getElementById('prof-name').value}%0AWA: ${document.getElementById('prof-wa').value}%0ALocation: ${document.getElementById('prof-loc').value}`;
            window.open(`https://wa.me/94755751816?text=${msg}`);
            alert("Details Submit Successfully!");
        };

        function logout() {
            localStorage.removeItem('dragon_session');
            location.reload();
        }

        function loadVault() {
            db.ref('vault_data').on('value', s => {
                const grid = document.getElementById('main-grid');
                grid.innerHTML = "";
                const data = s.val() || {};
                for(let key in data) {
                    let v = data[key];
                    if(v.type === 'PREMIUM' && (!currentUser || currentUser.type !== 'PREMIUM' && currentUser.id !== 'kaviakiya@gmail.com')) continue;
                    
                    grid.innerHTML += `
                        <div class="card ${v.type==='PREMIUM'?'premium-card':''}">
                            <span style="font-size:10px; color:${v.type==='PREMIUM'?'var(--core-gold)':'#555'}">${v.type} SERVER</span>
                            <h3 style="margin:8px 0;">${v.name}</h3>
                            <button class="btn-action" onclick="navigator.clipboard.writeText('${v.url}'); alert('Config Copied!');">COPY CONFIG</button>
                            ${(currentUser && currentUser.id === 'kaviakiya@gmail.com') ? `<i class="fas fa-trash" style="color:red; cursor:pointer; margin-top:10px;" onclick="db.ref('vault_data').child('${key}').remove()"></i>` : ''}
                        </div>
                    `;
                }
            });
        }

        function checkAdminGate() {
            if(currentUser && currentUser.id === "kaviakiya@gmail.com") {
                if(prompt("ADMIN KEY:") === "dragon@akiya26") document.getElementById('admin-box').style.display='block';
            } else { alert("Admin Access Denied!"); }
        }

        function pushData() {
            db.ref('vault_data').push({
                name: document.getElementById('c-name').value,
                url: document.getElementById('c-url').value,
                type: document.getElementById('c-type').value
            });
            alert("Published!");
        }

        function showPremiumInfo() { alert("Contact AKIYA (94755751816) to get a Premium Login!"); }

        window.onload = checkSession;

        // Background
        const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const particles = [];
        for(let i=0; i<50; i++) particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, s:Math.random()*2});
        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height); ctx.fillStyle="#ff003c";
            particles.forEach(p => {
                ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI*2); ctx.fill();
                p.y -= 0.5; if(p.y < 0) p.y = canvas.height;
            });
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
