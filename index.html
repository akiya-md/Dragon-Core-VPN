
<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝐃𝐑𝐀𝐆𝐎𝐍 𝐂𝐎𝐑𝐄 𝐕𝐏𝐍 | Professional Vault</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --core-red: #ff003c; --core-gold: #ffd700; --dark-bg: #030303; --glass: rgba(20,20,20,0.95); }
        * { box-sizing: border-box; cursor: crosshair; transition: 0.3s; }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }

        #bg-canvas { position: fixed; inset: 0; z-index: -1; opacity: 0.15; }

        /* --- AUTH & LAYOUT --- */
        #auth-screen { position: fixed; inset: 0; background: black; z-index: 10000; display: flex; align-items: center; justify-content: center; }
        #main-site { display: none; }
        nav { padding: 15px 25px; background: rgba(0,0,0,0.95); border-bottom: 2px solid var(--core-red); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .logo { font-weight: 900; color: var(--core-red); font-size: 1.4rem; text-shadow: 0 0 10px var(--core-red); }
        .user-img { width: 30px; border-radius: 50%; border: 1px solid var(--core-red); }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        
        /* --- CARD --- */
        .card { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 25px; border-radius: 15px; position: relative; }
        .card:hover { border-color: var(--core-red); transform: translateY(-8px); box-shadow: 0 10px 20px rgba(255,0,60,0.1); }
        .badge { position: absolute; top: 15px; right: 15px; font-size: 8px; font-weight: 900; padding: 4px 10px; border-radius: 4px; }

        .btn-action { display: block; width: 100%; padding: 12px; margin-top: 20px; background: transparent; border: 1px solid var(--core-red); color: var(--core-red); text-align: center; text-decoration: none; font-weight: bold; font-size: 11px; border-radius: 8px; cursor: pointer; }
        .btn-action:hover { background: var(--core-red); color: white; box-shadow: 0 0 20px var(--core-red); }

        /* --- MODAL (POPUP) --- */
        #config-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 20000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--glass); border: 1px solid var(--core-red); width: 100%; max-width: 500px; border-radius: 20px; padding: 30px; position: relative; box-shadow: 0 0 50px rgba(255,0,60,0.2); }
        .close-modal { position: absolute; top: 20px; right: 20px; color: #555; font-size: 20px; cursor: pointer; }
        .modal-data-box { background: #000; border: 1px solid #222; padding: 15px; border-radius: 10px; font-family: monospace; font-size: 12px; color: var(--core-gold); margin: 20px 0; word-break: break-all; }

        /* --- ADMIN --- */
        #admin-section { display: none; background: #070707; border: 1px dashed var(--core-gold); padding: 30px; border-radius: 20px; margin-bottom: 50px; }
        .admin-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; margin-bottom: 12px; border-radius: 8px; }

        .btn-group { display: flex; gap: 10px; }
        .btn-sub { flex: 1; padding: 10px; font-size: 10px; font-weight: bold; border-radius: 5px; border: 1px solid #333; background: #111; color: #fff; cursor: pointer; }
        .btn-sub:hover { background: #222; border-color: var(--core-gold); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div id="config-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="m-name" style="color: var(--core-red); margin-top: 0;"></h2>
            <p id="m-info" style="color: #888; font-size: 13px;"></p>
            <div class="modal-data-box" id="m-url"></div>
            
            <div class="btn-group">
                <button class="btn-sub" onclick="copyConfig()"><i class="fas fa-copy"></i> COPY LINK</button>
                <button class="btn-sub" onclick="downloadDoc()"><i class="fas fa-file-download"></i> SAVE DOC</button>
            </div>
            <a id="m-direct" href="#" target="_blank" class="btn-action">DIRECT DOWNLOAD</a>
        </div>
    </div>

    <div id="auth-screen">
        <div style="text-align:center">
            <i class="fas fa-dragon" style="color: var(--core-red); font-size: 60px;"></i>
            <h1 style="letter-spacing: 5px;">DRAGON CORE</h1>
            <button onclick="loginWithGoogle()" class="btn-action" style="background:white; color:black; border:none;">SIGN IN WITH GOOGLE</button>
        </div>
    </div>

    <div id="main-site">
        <nav>
            <div class="logo">DRAGON <span style="color:white">CORE</span></div>
            <div id="user-display"></div>
        </nav>

        <div class="container">
            <div id="admin-section">
                <h3 style="color: var(--core-gold);">🐲 COMMAND CENTER</h3>
                <input type="text" id="c-name" class="admin-input" placeholder="Config Name">
                <input type="text" id="c-info" class="admin-input" placeholder="Description">
                <input type="text" id="c-url" class="admin-input" placeholder="Config URL / Code">
                <select id="c-dev" class="admin-input">
                    <option value="MOBILE">MOBILE</option>
                    <option value="PC">PC / WINDOWS</option>
                </select>
                <button class="btn-action" style="border-color: var(--core-gold); color: var(--core-gold);" onclick="pushData()">PUSH TO VAULT</button>
            </div>

            <div class="grid" id="vault-grid"></div>
        </div>
        
        <footer style="text-align:center; padding:50px; color:#222; font-size:9px;">
            <p>DRAGON CORE VPN v4.0</p>
            <p onclick="adminGate()" style="cursor:pointer">SYSTEM_ACCESS_KEY</p>
        </footer>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAqX2abIZOxSTIhneLuxHqsMl66l9cGAVo",
            authDomain: "dragon-core-vpn.firebaseapp.com",
            databaseURL: "https://dragon-core-vpn-default-rtdb.firebaseio.com",
            projectId: "dragon-core-vpn",
            storageBucket: "dragon-core-vpn.firebasestorage.app",
            messagingSenderId: "114225209703",
            appId: "1:114225209703:web:4c2b9611511e892db9cfc2"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();
        const ADMIN_EMAIL = "kaviakiya@gmail.com";

        function loginWithGoogle() {
            auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(res => {
                localStorage.setItem('dragon_user', JSON.stringify(res.user));
                renderSite();
            });
        }

        function renderSite() {
            const user = JSON.parse(localStorage.getItem('dragon_user'));
            if(user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-site').style.display = 'block';
                document.getElementById('user-display').innerHTML = `<img src="${user.photoURL}" class="user-img">`;
                loadVault();
            }
        }

        function loadVault() {
            db.ref('vault_data').on('value', s => {
                const data = s.val();
                const grid = document.getElementById('vault-grid');
                grid.innerHTML = "";
                for(let key in data) {
                    let v = data[key];
                    grid.innerHTML += `
                        <div class="card">
                            <span class="badge" style="background:${v.dev==='PC'?'#00ff41':'#0088ff'}; color:black;">${v.dev}</span>
                            <h3>${v.name}</h3>
                            <p style="font-size:11px; color:#555;">${v.info}</p>
                            <button class="btn-action" onclick="openModal('${v.name}', '${v.info}', '${v.url}')">VIEW CONFIG</button>
                        </div>
                    `;
                }
            });
        }

        function openModal(name, info, url) {
            document.getElementById('m-name').innerText = name;
            document.getElementById('m-info').innerText = info;
            document.getElementById('m-url').innerText = url;
            document.getElementById('m-direct').href = url;
            document.getElementById('config-modal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('config-modal').style.display = 'none'; }

        function copyConfig() {
            const url = document.getElementById('m-url').innerText;
            navigator.clipboard.writeText(url);
            alert("Config Link Copied!");
        }

        function downloadDoc() {
            const name = document.getElementById('m-name').innerText;
            const info = document.getElementById('m-info').innerText;
            const url = document.getElementById('m-url').innerText;
            const text = `DRAGON CORE VPN CONFIG\n\nName: ${name}\nDetails: ${info}\nLink/Code: ${url}\n\nGenerated by Akiya-MD`;
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.download = `${name}_config.txt`;
            anchor.href = window.URL.createObjectURL(blob);
            anchor.click();
        }

        function adminGate() {
            const user = JSON.parse(localStorage.getItem('dragon_user'));
            if(user && user.email === ADMIN_EMAIL) {
                if(prompt("ACCESS CODE:") === "dragon@akiya26") {
                    document.getElementById('admin-section').style.display = 'block';
                }
            }
        }

        function pushData() {
            db.ref('vault_data').push({
                name: document.getElementById('c-name').value,
                info: document.getElementById('c-info').value,
                url: document.getElementById('c-url').value,
                dev: document.getElementById('c-dev').value
            });
            alert("Vault Updated!");
            location.reload();
        }

        window.onload = renderSite;

        // Particles
        const c = document.getElementById('bg-canvas'), x = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        const pts = [];
        for(let i=0; i<80; i++) pts.push({x:Math.random()*c.width, y:Math.random()*c.height, v:Math.random()*0.5});
        function draw() {
            x.clearRect(0,0,c.width,c.height); x.fillStyle="#ff003c";
            pts.forEach(i => { x.beginPath(); x.arc(i.x, i.y, 1.2, 0, 7); x.fill(); i.y -= i.v; if(i.y<0) i.y=c.height; });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
